<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda</title>
    <link rel="stylesheet" href="style.css">
    <style>
       
    :root {
        --primary-color: #004a8d;
        --accent-color: #d4af37;
    }

    /* Reset para garantir que nada "vaze" para fora da tela */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%; /* Base para o cálculo */
        background-color: #f4f7f6;
        font-family: 'Segoe UI', sans-serif;
        overflow-x: hidden;
    }

    /* O SEGREDO: Usar min-height e padding flexível */
    .hero {
        display: block; /* Mudamos de flex para block para evitar compressão de itens */
        width: 100%;
        min-height: 100vh; 
        padding-top: 80px;    /* Espaço do Header */
        padding-bottom: 95px; /* ESPAÇO EXTRA NO FUNDO PARA A MENSAGEM NÃO CORTAR */
        padding-left: 15px;
        padding-right: 15px;
    }

    .back-nav {
        margin-bottom: 15px;
    }

    .btn-voltar {
        text-decoration: none;
        color: var(--primary-color);
        font-weight: bold;
        font-size: 0.9rem;
        display: inline-block;
    }

    .calendar-container {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 380px;
        margin: 0 auto 20px auto; /* Centraliza e dá margem embaixo */
    }

    .calendar-header {
        text-align: center;
        margin-bottom: 15px;
        color: var(--primary-color);
        font-weight: bold;
        text-transform: uppercase;
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        text-align: center;
    }

    .day {
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        border-radius: 50%;
    }

    .class-day {
        background-color: var(--accent-color) !important;
        color: white !important;
        font-weight: bold;
    }

    .today {
        border: 2px solid var(--primary-color);
    }

    /* CAIXA DE MENSAGEM: Ajustada para nunca sumir */
    .info-aula {
        width: 100%;
        max-width: 380px;
        margin: 0 auto; /* Centraliza horizontalmente */
        background: white;
        padding: 20px;
        border-radius: 15px;
        border-left: 6px solid var(--accent-color);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        position: relative; /* Garante que respeite o fluxo do texto */
    }

    .info-aula h4 {
        color: var(--primary-color);
        margin-bottom: 8px;
    }

    /* Estilo do Header (para garantir que seja fixo mas não atrapalhe) */
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: var(--primary-color);
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 1000;
    }
</style>
    
</head>
<body>

    <header>
        <div class="logo">EBD<span>Agenda</span></div>
        <div id="openMenu" class="menu-icon">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </header>

    <nav id="navMenu" class="nav-overlay">
        <span id="closeMenu" class="close-btn">&times;</span>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="calendario.html">Agenda de Aulas</a></li>
            <li><a href="#">Lições</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="back-nav">
            <a href="index.html" class="btn-voltar">⬅ Voltar ao Início</a>
        </div>

        <div class="calendar-container">
            <div class="calendar-header" id="monthName">Mês Atual</div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>

        <div class="info-aula">
            <h4>📅 Próxima Aula:</h4>
            <p id="proximaAulaMsg">Carregando informações...</p>

            <div style="height: 40px;"></div>
        </div>
    </main>

    <script>
        // --- CONFIGURAÇÃO: COLOQUE AQUI OS DIAS DE AULA DO MÊS ATUAL ---
        const diasDeAula = [1, 2, 3, 31]; // Exemplo: Aulas em dias alternados
        // --------------------------------------------------------------

        function gerarCalendario() {
            const grid = document.getElementById('calendarGrid');
            const monthText = document.getElementById('monthName');
            const msgLink = document.getElementById('proximaAulaMsg');
            
            const agora = new Date();
            const ano = agora.getFullYear();
            const mes = agora.getMonth();
            const hojeData = agora.getDate();

            const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            monthText.innerText = `${nomesMeses[mes]} ${ano}`;

            // Gerar cabeçalho dos dias
            const diasSemana = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
            grid.innerHTML = '';
            diasSemana.forEach(d => {
                const el = document.createElement('div');
                el.className = 'day-name';
                el.innerText = d;
                grid.appendChild(el);
            });

            const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
            const ultimoDiaMes = new Date(ano, mes + 1, 0).getDate();

            // Espaços em branco do mês anterior
            for (let i = 0; i < primeiroDiaSemana; i++) {
                grid.appendChild(document.createElement('div'));
            }

            let proximaDataEncontrada = null;

            // Criar os dias do mês
            for (let dia = 1; dia <= ultimoDiaMes; dia++) {
                const divDia = document.createElement('div');
                divDia.className = 'day';
                divDia.innerText = dia;

                // Destacar se estiver na lista de dias de aula
                if (diasDeAula.includes(dia)) {
                    divDia.classList.add('class-day');
                    
                    // Lógica para identificar a próxima aula
                    if (!proximaDataEncontrada && dia >= hojeData) {
                        proximaDataEncontrada = dia;
                    }
                }

                // Destacar o dia de hoje
                if (dia === hojeData) {
                    divDia.classList.add('today');
                }

                grid.appendChild(divDia);
            }

            // Atualizar mensagem de texto
            if (proximaDataEncontrada) {
                if (proximaDataEncontrada === hojeData) {
                    msgLink.innerText = "Glória a Deus! A aula é HOJE. Esperamos por você!";
                } else {
                    msgLink.innerText = `A próxima aula está confirmada para o dia ${proximaDataEncontrada} de ${nomesMeses[mes]}.`;
                }
            } else {
                msgLink.innerText = "Não há mais aulas agendadas para este mês.";
            }
        }

        // Lógica do Menu (Repetida para funcionar nesta página)
        const navMenu = document.getElementById('navMenu');
        const openMenu = document.getElementById('openMenu');
        const closeMenu = document.getElementById('closeMenu');

        openMenu.onclick = () => navMenu.style.width = "100%";
        closeMenu.onclick = () => navMenu.style.width = "0";

        window.onload = gerarCalendario;
    </script>
</body>
</html>
